<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - TASKFLOW</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-wrap"> 
    <div class="auth-card">

        <div class="auth-logo"> 
            <div class="badge">T</div>
            <div>
                <h1>TASKFLOW</h1>
                <p>Gestão Corporativa</p>
            </div>
        </div>

        <div class="auth-form">

            <h2>Criar Conta</h2>
            <p class="subtitle">Cadastre sua empresa para começar</p> 

            <div class="form-group">
                <label>Empresa</label>
                <input
                    type="text"
                    id="empresa"
                    placeholder="Digite o nome da empresa"
                >
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu email"
                >
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                >
            </div>

            <button
                class="btn btn-primary btn-block"
                onclick="cadastrar()"
            >
                Cadastrar
            </button>

            <p class="auth-footer">
                Já possui conta?
                <a href="/login.html">
                    Entrar
                </a>
            </p>

        </div> <!-- Fechamento da auth-form corrigido aqui -->

    </div>
</div>

<script>
async function cadastrar() {
    const empresa = document.getElementById("empresa").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();

    // ===============================
    // VALIDAÇÃO
    // ===============================
    if (!empresa || !email || !senha) {
        alert("Preencha todos os campos!");
        return;
    }

    try {
        // ===============================
        // REQUISIÇÃO PARA API JAVA
        // ===============================
        const resposta = await fetch("http://localhost:8080/usuarios/cadastro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                empresa,
                email,
                senha
            })
        });

        const texto = await resposta.text();

        // ===============================
        // RESPOSTA
        // ===============================
        alert(texto);

        if (texto === "Usuário cadastrado com sucesso") {
            window.location.href = "/login.html";
        }
    } catch (erro) {
        console.error(erro);
        alert("Erro ao conectar com o servidor!");
    }
}
</script>

</body>
</html>
