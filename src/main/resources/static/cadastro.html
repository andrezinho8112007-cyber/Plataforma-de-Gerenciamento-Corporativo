<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro - TASKFLOW</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="auth-wrap">

  <div class="auth-card">

    <div class="auth-logo">

      <div class="badge">T</div>

      <div>
        <h1>TASKFLOW</h1>
        <p>Gestão Corporativa</p>
      </div>

    </div>

    <h2>Criar Conta</h2>

    <p class="subtitle">
      Cadastre sua empresa
    </p>

    <form onsubmit="event.preventDefault(); window.location.href='login.html';">

      <div class="form-group">
        <label>Nome Completo</label>

        <input
          type="text"
          placeholder="Seu nome"
          required
        >
      </div>

      <div class="form-group">
        <label>Empresa</label>

        <input
          type="text"
          placeholder="Nome da empresa"
          required
        >
      </div>

      <div class="form-group">
        <label>CPF</label>

        <input
          type="text"
          id="cpf"
          placeholder="000.000.000-00"
          required
        >
      </div>

      <div class="form-group">
        <label>E-mail</label>

        <input
          type="email"
          placeholder="empresa@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label>Senha</label>

        <input
          type="password"
          placeholder="********"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Cadastrar
      </button>

    </form>

    <p class="auth-footer">
      Já possui conta?
      <a href="login.html">Entrar</a>
    </p>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
