<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funcionários - TASKFLOW</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="app">

  <aside class="sidebar">

    <div class="sidebar-header">

      <div class="badge">T</div>

      <div>
        <h1>TASKFLOW</h1>
        <p>Gestão Corporativa</p>
      </div>

    </div>

    <nav>

      <a href="dashboard.html">
        <span class="icon">📊</span>
        <span>Painel</span>
      </a>

      <a href="employees.html" class="active">
        <span class="icon">👥</span>
        <span>Funcionários</span>
      </a>

      <a href="merchandise.html">
        <span class="icon">📦</span>
        <span>Mercadorias</span>
      </a>

    </nav>

    <button class="logout" onclick="window.location.href='login.html'">
      <span>Sair</span>
    </button>

  </aside>

  <div class="main">

    <header class="topbar">
      <h2>Funcionários</h2>
    </header>

    <div class="content">

      <div class="panel">

        <div class="panel-header">

          <h3>Lista de Funcionários</h3>

          <button class="btn btn-primary" onclick="abrirModal()">
            + Adicionar
          </button>

        </div>

        <table>

          <thead>

            <tr>
              <th>Nome</th>
              <th>Cargo</th>
              <th>Setor</th>
            </tr>

          </thead>

          <tbody id="tabela-funcionarios">

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal">

  <div class="modal">

    <h3>Novo Funcionário</h3>

    <div class="form-group">

      <label>Nome</label>

      <input type="text" id="nome">

    </div>

    <div class="form-group">

      <label>Cargo</label>

      <input type="text" id="cargo">

    </div>

    <div class="form-group">

      <label>Setor</label>

      <input type="text" id="setor">

    </div>

    <div class="modal-actions">

      <button class="btn btn-outline" onclick="fecharModal()">
        Cancelar
      </button>

      <button class="btn btn-primary" onclick="adicionarFuncionario()">
        Salvar
      </button>

    </div>

  </div>

</div>

<script>

const modal = document.getElementById("modal");

function abrirModal() {
    modal.classList.add("open");
}

function fecharModal() {
    modal.classList.remove("open");
}

function adicionarFuncionario() {

    const nome = document.getElementById("nome").value.trim();
    const cargo = document.getElementById("cargo").value.trim();
    const setor = document.getElementById("setor").value.trim();

    if (!nome || !cargo || !setor) {

        alert("Preencha todos os campos!");
        return;

    }

    const tabela = document.getElementById("tabela-funcionarios");

    const novaLinha = `
        <tr>
            <td>${nome}</td>
            <td>${cargo}</td>
            <td>${setor}</td>
        </tr>
    `;

    tabela.innerHTML += novaLinha;

    document.getElementById("nome").value = "";
    document.getElementById("cargo").value = "";
    document.getElementById("setor").value = "";

    fecharModal();
}

</script>

</body>
</html>
